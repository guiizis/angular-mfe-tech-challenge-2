<section class="financial-chart">
  <ngx-charts-pie-chart
    [view]="view"
    [scheme]="colorScheme"
    [results]="financialVisibility"
    [gradient]="gradient"
    [legend]="showLegend"
    [labels]="showLabels"
    [trimLabels]="trimLabels"
    [maxLabelLength]="maxLabelLength"
    [doughnut]="isDoughnut"
    (select)="onSelect($event)"
    (activate)="onActivate($event)"
    (deactivate)="onDeactivate($event)"
  >
  </ngx-charts-pie-chart>

  <ul class="financial-chart__legend" aria-label="Legenda do gráfico financeiro">
    @for (item of chartLegend; track item.name) {
      <li class="financial-chart__legend-item">
        <span class="financial-chart__legend-marker" [style.background]="item.color"></span>
        <span>{{ item.name }}</span>
      </li>
    }
  </ul>
</section>
